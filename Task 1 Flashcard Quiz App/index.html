<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Study Quiz App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 5px;
        }

        header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        /* 3D Flashcard Styles */
        .flashcard-wrapper {
            perspective: 1000px;
            width: 100%;
            height: 220px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }

        .card-front {
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            color: #2c3e50;
        }

        .card-back {
            background-color: #f0f7ff;
            border: 2px solid #3498db;
            color: #2980b9;
            transform: rotateY(180deg);
        }

        .card-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card-text {
            font-size: 18px;
            font-weight: 500;
            line-height: 1.5;
            word-break: break-word;
        }

        /* App Controls */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #eaedf1;
            color: #475569;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
            flex-grow: 1;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-success {
            background-color: #2ecc71;
            color: white;
        }

        .btn-success:hover {
            background-color: #27ae60;
        }

        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .counter {
            text-align: center;
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 25px;
        }

        .action-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 20px;
        }

        /* Form Customization Container */
        .form-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .form-section h3 {
            font-size: 16px;
            color: #334155;
            margin-bottom: 15px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 5px;
        }

        .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
            outline: none;
        }

        .input-group textarea:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        .form-buttons {
            display: flex;
            gap: 10px;
        }

        .form-buttons button {
            flex: 1;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Flashcard Study Tool</h1>
            <p>Test your knowledge or build your own customized deck</p>
        </header>

        <!-- Flashcard Showcase -->
        <div class="flashcard-wrapper" id="card-wrapper">
            <div class="flashcard" id="flashcard">
                <div class="card-face card-front">
                    <span class="card-label">Question</span>
                    <p class="card-text" id="question-text">Loading question...</p>
                </div>
                <div class="card-face card-back">
                    <span class="card-label">Answer</span>
                    <p class="card-text" id="answer-text">Loading answer...</p>
                </div>
            </div>
        </div>

        <!-- Navigation Row -->
        <div class="controls">
            <button class="btn-secondary" id="prev-btn">◀ Prev</button>
            <button class="btn-primary" id="flip-btn">Show Answer</button>
            <button class="btn-secondary" id="next-btn">Next ▶</button>
        </div>

        <!-- Card Progress Indicator -->
        <div class="counter" id="card-counter">Card 0 of 0</div>

        <!-- Utility Actions -->
        <div class="action-bar">
            <button class="btn-secondary" id="edit-mode-btn">✏️ Edit Card</button>
            <button class="btn-danger" id="delete-btn">🗑️ Delete Card</button>
        </div>

        <!-- Form Context for Add / Edit -->
        <div class="form-section">
            <h3 id="form-title">Add New Flashcard</h3>
            <div class="input-group">
                <label for="form-question">Question</label>
                <textarea id="form-question" placeholder="Type your quiz question here..."></textarea>
            </div>
            <div class="input-group">
                <label for="form-answer">Answer</label>
                <textarea id="form-answer" placeholder="Type the correct answer here..."></textarea>
            </div>
            <div class="form-buttons">
                <button class="btn-success" id="save-btn">Save Flashcard</button>
                <button class="btn-secondary hidden" id="cancel-edit-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Default seed data if LocalStorage is clean
        const defaultDeck = [
            { question: "What is the capital of France?", answer: "Paris" },
            { question: "What does HTML stand for?", answer: "HyperText Markup Language" },
            { question: "Which core web language adds interactivity and logical conditions to a website?", answer: "JavaScript" },
            { question: "What planet is known as the Red Planet?", answer: "Mars" }
        ];

        // Global State Configuration
        let deck = JSON.parse(localStorage.getItem('study_flashcards')) || defaultDeck;
        let currentIndex = 0;
        let isEditing = false;

        // Core DOM Hooks
        const flashcard = document.getElementById('flashcard');
        const cardWrapper = document.getElementById('card-wrapper');
        const questionText = document.getElementById('question-text');
        const answerText = document.getElementById('answer-text');
        
        const prevBtn = document.getElementById('prev-btn');
        const flipBtn = document.getElementById('flip-btn');
        const nextBtn = document.getElementById('next-btn');
        const cardCounter = document.getElementById('card-counter');
        
        const editModeBtn = document.getElementById('edit-mode-btn');
        const deleteBtn = document.getElementById('delete-btn');
        
        const formTitle = document.getElementById('form-title');
        const formQuestion = document.getElementById('form-question');
        const formAnswer = document.getElementById('form-answer');
        const saveBtn = document.getElementById('save-btn');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');

        // Initial Layout Initialization
        renderApp();

        // UI Core Logic Wrapper
        function renderApp() {
            // Force reset flip orientation on transition updates
            flashcard.classList.remove('flipped');
            flipBtn.textContent = "Show Answer";

            if (deck.length === 0) {
                questionText.textContent = "Your study deck is currently empty! Add cards below.";
                answerText.textContent = "No answers found.";
                cardCounter.textContent = "Card 0 of 0";
                
                // Hide actions unworkable on an empty array
                editModeBtn.classList.add('hidden');
                deleteBtn.classList.add('hidden');
                return;
            }

            // Reveal actions if array has assets
            editModeBtn.classList.remove('hidden');
            deleteBtn.classList.remove('hidden');

            // Bounds protection
            if (currentIndex >= deck.length) currentIndex = deck.length - 1;
            if (currentIndex < 0) currentIndex = 0;

            // Load active index values
            questionText.textContent = deck[currentIndex].question;
            answerText.textContent = deck[currentIndex].answer;
            cardCounter.textContent = `Card ${currentIndex + 1} of ${deck.length}`;
        }

        function saveToStorage() {
            localStorage.setItem('study_flashcards', JSON.stringify(deck));
        }

        // Toggle flipping mechanic rules
        function toggleFlip() {
            if (deck.length === 0) return;
            flashcard.classList.toggle('flipped');
            
            if (flashcard.classList.contains('flipped')) {
                flipBtn.textContent = "Show Question";
            } else {
                flipBtn.textContent = "Show Answer";
            }
        }

        cardWrapper.addEventListener('click', toggleFlip);
        flipBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Avoid double bubbling on click triggers
            toggleFlip();
        });

        // Pagination Rules
        nextBtn.addEventListener('click', () => {
            if (deck.length <= 1) return;
            currentIndex = (currentIndex + 1) % deck.length;
            resetFormState();
            renderApp();
        });

        prevBtn.addEventListener('click', () => {
            if (deck.length <= 1) return;
            currentIndex = (currentIndex - 1 + deck.length) % deck.length;
            resetFormState();
            renderApp();
        });

        // Add & Edit Handler Form Submission
        saveBtn.addEventListener('click', () => {
            const qVal = formQuestion.value.trim();
            const aVal = formAnswer.value.trim();

            if (!qVal || !aVal) {
                alert("Please fill in both the Question and Answer fields.");
                return;
            }

            if (isEditing) {
                // Update target card parameters
                deck[currentIndex] = { question: qVal, answer: aVal };
                isEditing = false;
            } else {
                // Creation append rule
                deck.push({ question: qVal, answer: aVal });
                currentIndex = deck.length - 1; // Relocate focus to newly created flashcard
            }

            saveToStorage();
            resetFormState();
            renderApp();
        });

        // Trigger Edit Field Populating Configuration
        editModeBtn.addEventListener('click', () => {
            if (deck.length === 0) return;
            isEditing = true;
            formTitle.textContent = `Editing Card #${currentIndex + 1}`;
            formQuestion.value = deck[currentIndex].question;
            formAnswer.value = deck[currentIndex].answer;
            
            cancelEditBtn.classList.remove('hidden');
            formQuestion.focus();
        });

        // Cancel Active Editing
        cancelEditBtn.addEventListener('click', resetFormState);

        // Delete Execution Method
        deleteBtn.addEventListener('click', () => {
            if (deck.length === 0) return;
            
            if (confirm("Are you sure you want to delete this flashcard?")) {
                deck.splice(currentIndex, 1);
                saveToStorage();
                
                // Adjust position boundary indices tracking backward shift
                if (currentIndex >= deck.length && currentIndex > 0) {
                    currentIndex--;
                }
                
                resetFormState();
                renderApp();
            }
        });

        // Clear Custom State Configurations back to Add Mode Defaults
        function resetFormState() {
            isEditing = false;
            formTitle.textContent = "Add New Flashcard";
            formQuestion.value = "";
            formAnswer.value = "";
            cancelEditBtn.classList.add('hidden');
        }
    </script>
</body>
</html>
