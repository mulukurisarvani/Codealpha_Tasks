<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quote-container">
        <!-- Elegant Quote Icon Decoration -->
        <div class="quote-icon">“</div>
        
        <!-- Text Content Wrapper -->
        <div class="quote-content" id="quote-wrapper">
            <p class="quote-text" id="quote-text">Loading an inspiring quote...</p>
            <p class="quote-author" id="quote-author">— Loading</p>
        </div>

        <!-- Minimal Interactive Button -->
        <button id="new-quote-btn" class="btn-primary">New Quote</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
